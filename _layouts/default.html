<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}
    </title>
    <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | default: site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    {%- feed_meta -%}
  </head>
  <body>
    <main class="container">
      <header class="site-header">
        <h1 class="site-name"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <nav>
          <a href="{{ '/posts/' | relative_url }}">posts</a>
          <a href="{{ '/about/' | relative_url }}">about</a>
        </nav>
      </header>

      {{ content }}

      <footer class="site-footer">
        <p>
          © {{ "now" | date: "%Y" }} {{ site.title }}
        </p>
      </footer>
    </main>
  </body>
</html>

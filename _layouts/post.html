---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <p class="meta">{{ page.date | date: "%B %-d, %Y" }}</p>

  {% if page.image %}
    <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="post-image" />
  {% endif %}

  {{ content }}
</article>

<p><a href="{{ '/posts/' | relative_url }}">← Back to all posts</a></p>
